apiVersion: v1
kind: Namespace
metadata:
  name: media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      dnsConfig:
        options:
        - name: ndots
          value: "1"
      initContainers:
      - name: configure-webui
        image: busybox:1.36
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        command:
        - sh
        - -c
        - |
          CONFIG_DIR=/config/qBittorrent
          CONFIG_FILE="$CONFIG_DIR/qBittorrent.conf"
          mkdir -p "$CONFIG_DIR"
          set_config() {
            section="$1"
            key="$2"
            value="$3"
            if grep -Fq "$key=" "$CONFIG_FILE"; then
              sed -i "s|^$key=.*|$key=$value|" "$CONFIG_FILE"
            elif grep -Fq "[$section]" "$CONFIG_FILE"; then
              sed -i "/^\[$section\]$/a $key=$value" "$CONFIG_FILE"
            else
              printf '\n[%s]\n%s=%s\n' "$section" "$key" "$value" >> "$CONFIG_FILE"
            fi
          }
          if [ ! -f "$CONFIG_FILE" ]; then
            {
              echo '[Preferences]'
            } > "$CONFIG_FILE"
          fi
          set_config 'BitTorrent' 'Session\DefaultSavePath' '/downloads'
          set_config 'BitTorrent' 'Session\TempPath' '/downloads/incomplete'
          set_config 'Preferences' 'WebUI\HostHeaderValidation' 'false'
        volumeMounts:
        - name: config
          mountPath: /config
      containers:
      - name: qbittorrent
        image: ghcr.io/linuxserver/qbittorrent:latest
        command:
        - /app/qbittorrent-nox
        args:
        - --webui-port=8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
        - containerPort: 6881
        - containerPort: 6881
          protocol: UDP
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Etc/UTC"
        - name: WEBUI_PORT
          value: "8080"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        hostPath:
          path: /home/pi/qbittorrent/config
          type: DirectoryOrCreate
      - name: downloads
        hostPath:
          path: /var/qbittorrent
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  type: NodePort
  selector:
    app: qbittorrent
  ports:
  - name: webui
    port: 8080
    targetPort: 8080
    nodePort: 32080
  - name: torrent-tcp
    port: 6881
    targetPort: 6881
    nodePort: 32681
  - name: torrent-udp
    port: 6881
    targetPort: 6881
    nodePort: 32682
    protocol: UDP
