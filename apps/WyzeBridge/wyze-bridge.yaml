apiVersion: v1
kind: Namespace
metadata:
  name: wyze-bridge
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wyze-bridge-tokens
  namespace: wyze-bridge
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyze-bridge
  namespace: wyze-bridge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wyze-bridge
  template:
    metadata:
      labels:
        app: wyze-bridge
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: wyze-bridge
        image: wyze-bridge-nonroot:2.10.3-1
        imagePullPolicy: Never
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: TZ
          value: America/New_York
        - name: WB_IP
          value: 192.168.1.29
        - name: WB_AUTH
          value: "true"
        envFrom:
        - secretRef:
            name: wyze-bridge-credentials
        ports:
        - name: web
          containerPort: 5000
        - name: rtsp
          containerPort: 8554
        - name: hls
          containerPort: 8888
        - name: webrtc
          containerPort: 8889
        - name: webrtc-ice
          containerPort: 8189
          protocol: UDP
        volumeMounts:
        - name: tokens
          mountPath: /tokens
        - name: images
          mountPath: /img
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        startupProbe:
          tcpSocket:
            port: web
          failureThreshold: 60
          periodSeconds: 5
        readinessProbe:
          tcpSocket:
            port: web
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: web
          initialDelaySeconds: 30
          periodSeconds: 30
      volumes:
      - name: tokens
        persistentVolumeClaim:
          claimName: wyze-bridge-tokens
      - name: images
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wyze-bridge
  namespace: wyze-bridge
spec:
  selector:
    app: wyze-bridge
  ports:
  - name: web
    port: 5000
    targetPort: web
  - name: rtsp
    port: 8554
    targetPort: rtsp
  - name: hls
    port: 8888
    targetPort: hls
  - name: webrtc
    port: 8889
    targetPort: webrtc
  - name: webrtc-ice
    port: 8189
    targetPort: webrtc-ice
    protocol: UDP
