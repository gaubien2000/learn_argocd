apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wyze-bridge
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/gaubien2000/learn_argocd.git'
    targetRevision: main
    path: apps/WyzeBridge
  destination:
    server: https://kubernetes.default.svc
    namespace: wyze-bridge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
